<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NurseTrack | Chair Overtime Details</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/nursetrack.css">
    <link rel="icon" type="image/png" href="../assets/cit-u-logo.png">

    <style>
      .validation-user-list {
        display: flex;
        flex-direction: column;
        gap: 0;
        border: 1px solid #e2e8f0;
        border-radius: 0.5rem;
        overflow: hidden;
        background: #ffffff;
      }

      .validation-user-card {
        display: flex;
        align-items: center;
        width: 100%;
        text-align: left;
        padding: 1rem 1.5rem;
        border: none;
        border-bottom: 1px solid #e2e8f0;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
        cursor: pointer;
        transition: background-color 0.2s;
        text-decoration: none;
        color: inherit;
      }

      .validation-user-card:hover {
        background-color: #f8fafc;
      }

      .validation-user-card.is-selected {
        background-color: #f1f5f9;
        border-left: 4px solid #800000;
      }

      .validation-user-card:last-child {
        border-bottom: none;
      }

      .validation-user-card > span:nth-child(2) {
        flex: 1;
        margin-left: 1.25rem;
        display: flex;
        flex-direction: column;
        gap: 0.125rem;
      }

      .validation-user-card small {
        color: #64748b;
        font-size: 0.875rem;
      }
    </style>
  </head>

  <body class="app-body">
    <div class="app-shell">
      <aside class="app-sidebar" aria-label="Primary navigation">
        <div class="sidebar-brand">
          <img class="sidebar-logo" src="../assets/cit-u-logo.png" alt="Cebu Institute of Technology - University logo">
          <div>
            <strong>NurseTrack</strong>
            <span>CIT-U Nursing</span>
          </div>
        </div>

        <div class="role-chip">Chair</div>

        <nav class="sidebar-nav">
          <a class="nav-link" href="admin-dashboard.html"><span class="nav-dot"></span>Dashboard</a>
          <a class="nav-link" href="admin-schedules.html"><span class="nav-dot"></span>Schedules</a>
          <a class="nav-link" href="live-attendance-tracker.html"><span class="nav-dot"></span>Live Attendance</a>
          <a class="nav-link" href="chair-student-progress.html"><span class="nav-dot"></span>Student Progress</a>
          <a class="nav-link" href="clinical-cases-view.html"><span class="nav-dot"></span>Clinical Cases View</a>
          <a class="nav-link" href="generate-report.html"><span class="nav-dot"></span>Reports</a>
          <a class="nav-link is-active" href="overtime-details.html" aria-current="page"><span class="nav-dot"></span>Overtime Details</a>
        </nav>

        <div class="sidebar-account">
          <div class="avatar">CR</div>
          <div>
            <strong>Reyes</strong>
            <span>Chair</span>
          </div>
        </div>
      </aside>

      <div class="sidebar-backdrop" data-close-sidebar></div>

      <div class="app-main">
        <header class="topbar">
          <button class="menu-button" type="button" data-menu-button>Menu</button>

          <div class="topbar-title">
            <img class="topbar-logo" src="../assets/cit-u-logo.png" alt="Cebu Institute of Technology - University logo">
            <div>
              <p>Chair Workspace</p>
              <h1>Overtime Details</h1>
            </div>
          </div>

          <div class="topbar-actions">
            <span class="sync-pill">Updated now</span>

            <a class="icon-button notification-button button-link" href="admin-notifications.html" aria-label="Notifications" title="Notifications">
              <svg class="notification-bell" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"></path>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
              </svg>
            </a>

            <a class="icon-button topbar-profile-button button-link" href="view-profile.html" aria-label="Profile" title="Profile">
              <svg class="profile-user-icon" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="8" r="4"></circle>
                <path d="M4 21a8 8 0 0 1 16 0"></path>
              </svg>
            </a>

            <a class="logout-link" href="../index.html">Logout</a>
          </div>
        </header>

        <main class="workspace validation-workspace">
          <section class="workspace-panel validation-lookup-panel">
            <div class="panel-heading">
              <div>
                <h2>People with Overtime Records</h2>
              </div>
              <span class="status-badge status-pending" id="overtime-result-count">0 people</span>
            </div>

            <div class="history-filters validation-lookup-filters" aria-label="Overtime search filters">
              <label class="form-label" for="overtime-search">
                Search person
                <input id="overtime-search" type="search" placeholder="Search name, ID, section, role, or clinical site">
              </label>

              <label class="form-label" for="overtime-role-filter">
                Type
                <select id="overtime-role-filter">
                  <option value="Clinical Instructor">Clinical Instructor</option>
                  <option value="Student">Student</option>
                </select>
              </label>

              <label class="form-label" for="overtime-hours-filter">
                OT Hours
                <select id="overtime-hours-filter">
                  <option value="1">0–1 hr</option>
                  <option value="2">2 hrs</option>
                  <option value="3">3 hrs</option>
                  <option value="4">4 hrs</option>
                  <option value="5">5+ hrs</option>
                </select>
              </label>
            </div>

            <div class="validation-user-list" id="overtime-person-list"></div>

            <div id="overtime-empty" class="empty-state" hidden>
              No overtime records match the selected filters.
            </div>
          </section>
        </main>
      </div>
    </div>

    <script src="../scripts/overtime-details.js"></script>
    <script src="../scripts/logout-confirm.js"></script>
    <script src="../scripts/sidebar-icons.js"></script>
    <script src="../scripts/consultation-update.js"></script>
  </body>
</html>
