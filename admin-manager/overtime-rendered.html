<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NurseTrack | Rendered Overtime</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/nursetrack.css">
    <link rel="icon" type="image/png" href="../assets/cit-u-logo.png">

    <style>
      .overtime-person-summary {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 0.75rem;
        margin-bottom: 1.25rem;
      }

      .overtime-person-summary div {
        padding: 1rem;
        border: 1px solid #e2e8f0;
        border-radius: 0.75rem;
        background: #f8fafc;
      }

      .overtime-person-summary span {
        display: block;
        color: #64748b;
        font-size: 0.8rem;
        margin-bottom: 0.25rem;
      }

      .overtime-person-summary strong {
        color: #1e293b;
        font-size: 0.95rem;
      }

      .overtime-sheet {
        border: 1px solid #e2e8f0;
        border-radius: 0.75rem;
        overflow: hidden;
        background: #ffffff;
      }

      .overtime-sheet-title {
        padding: 1rem;
        text-align: center;
        font-weight: 800;
        color: #800000;
        background: #fff7d6;
        border-bottom: 1px solid #e2e8f0;
      }

      .overtime-table {
        width: 100%;
        overflow-x: auto;
      }

      .overtime-table-row {
        display: grid;
        grid-template-columns: 0.4fr 1fr 1.5fr 1.5fr 0.8fr;
        min-width: 720px;
        border-bottom: 1px solid #e2e8f0;
      }

      .overtime-table-row:last-child {
        border-bottom: none;
      }

      .overtime-table-row span {
        padding: 0.85rem;
        font-size: 0.88rem;
        color: #334155;
        border-right: 1px solid #e2e8f0;
      }

      .overtime-table-row span:last-child {
        border-right: none;
      }

      .overtime-table-head span {
        background: #800000;
        color: #ffffff;
        font-weight: 700;
      }

      @media (max-width: 900px) {
        .overtime-person-summary {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 680px) {
        .overtime-person-summary {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body class="app-body">
    <div class="app-shell">
      <aside class="app-sidebar" aria-label="Primary navigation">
        <div class="sidebar-brand">
          <img class="sidebar-logo" src="../assets/cit-u-logo.png" alt="Cebu Institute of Technology - University logo">
          <div>
            <strong>NurseTrack</strong>
            <span>CIT-U Nursing</span>
          </div>
        </div>

        <div class="role-chip">Chair</div>

        <nav class="sidebar-nav">
          <a class="nav-link" href="admin-dashboard.html"><span class="nav-dot"></span>Dashboard</a>
          <a class="nav-link" href="admin-schedules.html"><span class="nav-dot"></span>Schedules</a>
          <a class="nav-link" href="live-attendance-tracker.html"><span class="nav-dot"></span>Live Attendance</a>
          <a class="nav-link" href="chair-student-progress.html"><span class="nav-dot"></span>Student Progress</a>
          <a class="nav-link" href="clinical-cases-view.html"><span class="nav-dot"></span>Clinical Cases View</a>
          <a class="nav-link is-active" href="overtime-details.html" aria-current="page"><span class="nav-dot"></span>Overtime Details</a>
          <a class="nav-link" href="generate-report.html"><span class="nav-dot"></span>Reports</a>
        </nav>

        <div class="sidebar-account">
          <div class="avatar">CR</div>
          <div>
            <strong>Reyes</strong>
            <span>Chair</span>
          </div>
        </div>
      </aside>

      <div class="sidebar-backdrop" data-close-sidebar></div>

      <div class="app-main">
        <header class="topbar">
          <button class="menu-button" type="button" data-menu-button>Menu</button>

          <div class="topbar-title">
            <img class="topbar-logo" src="../assets/cit-u-logo.png" alt="Cebu Institute of Technology - University logo">
            <div>
              <p>Chair Workspace</p>
              <h1>Rendered Overtime</h1>
            </div>
          </div>

          <div class="topbar-actions">
            <span class="sync-pill">Updated now</span>

            <a class="icon-button notification-button button-link" href="admin-notifications.html" aria-label="Notifications" title="Notifications">
              <svg class="notification-bell" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"></path>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
              </svg>
            </a>

            <a class="icon-button topbar-profile-button button-link" href="view-profile.html" aria-label="Profile" title="Profile">
              <svg class="profile-user-icon" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="8" r="4"></circle>
                <path d="M4 21a8 8 0 0 1 16 0"></path>
              </svg>
            </a>

            <a class="logout-link" href="../index.html">Logout</a>
          </div>
        </header>

        <main class="workspace overtime-rendered-workspace">
          <section class="workspace-panel overtime-record-panel">
            <div class="overtime-person-summary">
              <div>
                <span>Name</span>
                <strong id="overtime-person-name">No selection</strong>
              </div>
              <div>
                <span>Role</span>
                <strong id="overtime-person-role">-</strong>
              </div>
              <div>
                <span>Period</span>
                <strong id="overtime-person-period">-</strong>
              </div>
              <div>
                <span>Total overtime</span>
                <strong id="overtime-person-total">0 hrs</strong>
              </div>
            </div>

            <div class="overtime-sheet">
              <div class="overtime-sheet-title" id="overtime-sheet-title">CNAHS OVERTIME DETAILS</div>
              <div class="overtime-table" id="overtime-table" aria-label="Overtime details table"></div>
            </div>

            <div id="overtime-detail-message" class="form-message selected-roster-message" role="status" aria-live="polite"></div>
          </section>
        </main>
      </div>
    </div>

    <script src="../scripts/overtime-rendered.js"></script>
    <script src="../scripts/logout-confirm.js"></script>
    <script src="../scripts/sidebar-icons.js"></script>
    <script src="../scripts/consultation-update.js"></script>
    <script src="../scripts/global-back-button.js"></script>
  </body>
</html>
